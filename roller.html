<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contención AGL - Retail</title>
    <style>
        :root {
            --primary-blue: #00529B;
            --success-green: #2E7D32;
            --error-red: #C62828;
            --bg-gray: #F5F7F8;
            --border-color: #D1D5DB;
            --text-main: #1F2937;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            background-color: #374151; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            background-color: #fff;
            border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 950px;
            width: 95%;
            margin: 20px 0;
        }

        .column { padding: 40px; flex: 1; box-sizing: border-box; }
        .image-column { background-color: #fff; display: flex; align-items: center; justify-content: center; padding: 0; }
        .image-column img { max-width: 90%; max-height: 90%; object-fit: contain; }

        h2, h3 { color: var(--text-main); margin-bottom: 20px; font-weight: 600; margin-top: 0; }
        label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #4B5563; }
        
        input, select {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 20px;
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        button:hover { background-color: #003D73; }
        button:disabled { background-color: #9CA3AF; cursor: not-allowed; }

        #mensaje-exito { color: var(--success-green); font-weight: bold; display: none; margin-top: 10px; text-align: center;}
        #mensaje-error { color: var(--error-red); font-weight: bold; display: none; margin-top: 10px; text-align: center;}

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(31, 41, 55, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }

        .modal-card {
            background: #fff;
            width: 90%;
            max-width: 500px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            overflow: hidden;
            max-height: 95vh;
            overflow-y: auto;
        }

        .modal-header {
            background-color: var(--bg-gray);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .modal-header h3 { margin: 0; font-size: 18px; color: var(--text-main); }
        .modal-body { padding: 25px; text-align: center; }
        
        .visual-aid-container {
            width: 100%;
            height: 350px;
            background-color: #f9fafb;
            border: 1px solid #f3f4f6;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
        }

        .visual-aid-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .action-instruction {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 15px;
        }

        .modal-footer {
            padding: 20px;
            display: flex;
            gap: 15px;
            background-color: #fff;
        }

        .btn-confirm { background-color: var(--success-green); flex: 1; }
        .btn-reject { background-color: var(--error-red); flex: 1; }

        .btn-confirm:disabled, .btn-reject:disabled {
            background-color: #E5E7EB !important; 
            color: #9CA3AF !important; 
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .column { padding: 20px; }
            .image-column img { height: 200px; }
        }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="column image-column">
            <img src="img1.jpg" alt="Referencia Visual">
        </div>

        <div class="column">
            <div id="login-container">
                <h2>Acceso de Operador</h2>
                <label>Número de Empleado</label>
                <input type="text" id="num_empleado" placeholder="Escanea gafete" required minlength="7">
                <label>Estación de Trabajo</label>
                <input type="text" id="estacion_trabajo" placeholder="Escanea estación" required minlength="10">
                <button type="button" id="btn-login">Ingresar al Sistema</button>
            </div>

            <div id="formulario-container" style="display:none;">
                <h3>Estación: <span id="info-usuario" style="color: var(--primary-blue);"></span></h3>
                <hr style="border: 0; border-top: 1px solid var(--border-color); margin-bottom: 25px;">
                
                <form id="miFormulario">
                    <label>Código del Ticket</label>
                    <input type="text" id="codigo_ticket" name="codigo_ticket" required>
                    
                    <label>Estatus</label>
                    <select id="estatus" name="estatus">
                        <option value="Ok">Ok</option>
                        <option value="Retrabajo">Retrabajo</option>
                    </select>

                    <div id="retrabajo-fields" style="display:none; padding-left: 15px; border-left: 3px solid var(--primary-blue); margin-bottom: 20px;">
                        
                        <label>Tipo de Problema</label>
                        <select id="tipo_problema" name="tipo_problema">
                            <option value="" disabled selected>Seleccione una opción</option>
                            <option value="Se sube de arriba y abajo">Se sube de arriba y abajo</option>
                            <option value="Se sube de arriba y se baja de abajo">Se sube de arriba y se baja de abajo</option>
                            <option value="Se baja de arriba y de abajo">Se baja de arriba y de abajo</option>
                            <option value="Se baja de arriba y se sube de abajo">Se baja de arriba y se sube de abajo</option>
                            <option value="Solo se sube de abajo">Solo se sube de abajo</option>
                            <option value="Solo se baja de abajo">Solo se baja de abajo</option>
                            <option value="Solo se sube de arriba">Solo se sube de arriba</option>
                            <option value="Solo se baja de arriba">Solo se baja de arriba</option>
                            <option value="No Opera">No Opera</option>
                            <option value="Sube Forzado">Sube Forzado</option>
                        </select>
                        
                        <input type="hidden" id="motor_ticket" name="motor_ticket" value="N/A">
                        <input type="hidden" id="motor_colocado" name="motor_colocado" value="N/A">

                    </div>

                    <button type="submit" id="btn-enviar">Guardar Registro</button>
                </form>
                
                <p id="mensaje-exito">Registro guardado exitosamente.</p>
                <p id="mensaje-error">Error al guardar. Intente de nuevo.</p>
            </div>
        </div>
    </div>

    <div id="modal-seguimiento" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="texto-problema" style="text-align: center;">Seguimiento de Calidad</h3>
            </div>
            <div class="modal-body">
                <div class="visual-aid-container">
                    <img id="img-problema-ejemplo" src="" alt="Ejemplo de falla">
                </div>
                <p style="font-size: 14px; color: #6B7280; margin-bottom: 10px;">Acción requerida:</p>
                <div id="modal-accion-texto" class="action-instruction"></div>
                
                <input type="number" id="modal-input-cuantas" placeholder="Ingrese cantidad" style="display:none; width: 60%; margin: 0 auto;">

                <div id="modal-motor-fields" style="display:none; text-align: left; margin-top: 20px; padding: 15px; background: var(--bg-gray); border-radius: 5px;">
                    <label>Configuración de motor ticket</label>
                    <select id="modal_motor_ticket">
                        <option value="1043755">1043755</option>
                        <option value="1050885">1050885</option>
                    </select>
                    <label style="margin-top: 15px;">Nueva configuración de motor</label>
                    <select id="modal_motor_colocado">
                        <option value="1043755">1043755</option>
                        <option value="1050885">1050885</option>
                    </select>
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" id="btn-quedo" class="btn-confirm">Corregido</button>
                <button type="button" id="btn-no-quedo" class="btn-reject">No Corregido</button>
            </div>
        </div>
    </div>

    <script>
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyZozArPdwRr2Dlx34yhWEhnKRZbsL29GTzSJsRJGxTN4q5S8pEwMu7fx0kDBMdWymdFg/exec"; 
        
        let empleadoLogueado = "";
        let estacionLogueada = "";
        let pasoActual = 0, flujoActual = [], accionResuelta = "", cantidadAplicada = "", resultadoRetrabajo = "";

        let estatusPendienteLargo = false;
        let modoRevisionPendiente = false;
        const accionesLargas = ["Cambiar a un motor mas debil", "Agregar 1 dumper"];

        const MAPA_IMAGENES = {
            "Se sube de arriba y abajo": "/sube-sube.gif",
            "Se sube de arriba y se baja de abajo": "/sube-baja.gif",
            "Se baja de arriba y de abajo": "/baja-baja.gif",
            "Se baja de arriba y se sube de abajo": "/baja-sube.gif",
            "Solo se sube de abajo": "/normal-sube.gif",
            "Solo se baja de abajo": "/normal-baja.gif",
            "Solo se sube de arriba": "/sube-normal.gif",
            "Solo se baja de arriba": "/baja-normal.gif"
        };

        const flujosProblema = {
            "Se sube de arriba y abajo": ["Agregar pesas (cuantas)", "Quitar vueltas (cuantas)", "Cambiar a un motor mas debil"],
            "Se sube de arriba y se baja de abajo": ["Quitar vueltas (cuantas)", "Agregar 1 dumper", "Cambiar a un motor mas debil"],
            "Se baja de arriba y de abajo": ["Agregar 1 dumper", "Cambiar a un motor mas debil"],
            "Se baja de arriba y se sube de abajo": ["Quitar vueltas (cuantas)", "Agregar 1 dumper", "Cambiar a un motor mas debil"],
            "Solo se sube de abajo": ["Agregar pesas (cuantas)", "Agregar vueltas", "Cambiar a un motor mas debil"],
            "Solo se baja de abajo": ["Agregar vueltas", "Agregar 1 dumper", "Cambiar a un motor mas debil"],
            "Solo se sube de arriba": ["Agregar pesas (cuantas)", "Agregar vueltas", "Cambiar a un motor mas debil"],
            "Solo se baja de arriba": ["Agregar vueltas", "Agregar pesas (cuantas)", "Agregar 1 dumper", "Cambiar a un motor mas debil"]
        };

        function toggleBotonesModal(bloquear) {
            document.getElementById('btn-quedo').disabled = bloquear;
            document.getElementById('btn-no-quedo').disabled = bloquear;
        }

        // Sincroniza datos del Modal al Formulario oculto
        function capturarMotoresSiAplican() {
            if (document.getElementById('modal-motor-fields').style.display === 'block') {
                document.getElementById('motor_ticket').value = document.getElementById('modal_motor_ticket').value;
                document.getElementById('motor_colocado').value = document.getElementById('modal_motor_colocado').value;
            }
        }

        function mostrarPaso() {
            let accion = flujoActual[pasoActual];
            const textoAccion = document.getElementById('modal-accion-texto');
            const inputCuantas = document.getElementById('modal-input-cuantas');
            const motorFields = document.getElementById('modal-motor-fields');
            
            motorFields.style.display = 'none'; // Ocultar por defecto

            estatusPendienteLargo = accionesLargas.some(a => accion.includes(a));

            if (estatusPendienteLargo && !modoRevisionPendiente) {
                textoAccion.innerHTML = accion + "<br><br><span style='font-size:14px; color:var(--primary-blue);'>⏳ Esta acción requiere enviar la pieza a otra estación.</span>";
                inputCuantas.style.display = 'none';
                
                document.getElementById('btn-quedo').textContent = "Guardar y Enviar a Estación";
                document.getElementById('btn-no-quedo').style.display = 'none'; 
                toggleBotonesModal(false); 
            } else {
                document.getElementById('btn-quedo').textContent = modoRevisionPendiente ? "Sí, Corregido" : "Corregido";
                document.getElementById('btn-no-quedo').style.display = 'block';
                document.getElementById('btn-no-quedo').textContent = modoRevisionPendiente ? "No, sigue fallando" : "No Corregido";

                // Si estamos en revisión y la acción involucra motor, mostrar las preguntas
                if (modoRevisionPendiente && accion.includes("motor")) {
                    motorFields.style.display = 'block';
                }

                if (accion.includes("(cuantas)")) {
                    textoAccion.textContent = accion.replace("(cuantas)", "").trim();
                    inputCuantas.style.display = 'block';
                    inputCuantas.value = '';
                    inputCuantas.focus();
                    toggleBotonesModal(true); 
                } else {
                    textoAccion.textContent = accion;
                    inputCuantas.style.display = 'none';
                    toggleBotonesModal(false); 
                }
            }
        }

        document.getElementById('modal-input-cuantas').addEventListener('input', function() {
            if (this.value && parseInt(this.value) > 0) toggleBotonesModal(false);
            else toggleBotonesModal(true);
        });

        // Intercepción del escáner para piezas pendientes
        document.getElementById('codigo_ticket').addEventListener('change', function(e) {
            let ticket = this.value.trim();
            let pendientes = JSON.parse(localStorage.getItem('ticketsPendientes')) || {};

            if (pendientes[ticket]) {
                let dataPendiente = pendientes[ticket];
                
                flujoActual = flujosProblema[dataPendiente.problema];
                pasoActual = dataPendiente.paso;
                modoRevisionPendiente = true;

                document.getElementById('estatus').value = 'Retrabajo';
                document.getElementById('retrabajo-fields').style.display = 'block';
                document.getElementById('tipo_problema').value = dataPendiente.problema;

                document.getElementById('texto-problema').innerText = "Revisión de Retrabajo";
                mostrarPaso(); 
                
                document.getElementById('modal-accion-texto').textContent = `¿La persiana quedó reparada tras: ${dataPendiente.accionLarga}?`;
                document.getElementById('img-problema-ejemplo').src = MAPA_IMAGENES[dataPendiente.problema] || "";
                document.getElementById('modal-seguimiento').style.display = 'flex';
            }
        });

        document.getElementById('tipo_problema').addEventListener('change', function() {
            const problema = this.value;
            accionResuelta = ""; cantidadAplicada = ""; resultadoRetrabajo = ""; modoRevisionPendiente = false; 
            
            if (flujosProblema[problema]) {
                flujoActual = flujosProblema[problema];
                pasoActual = 0; 
                document.getElementById('img-problema-ejemplo').src = MAPA_IMAGENES[problema] || "";
                mostrarPaso();
                document.getElementById('modal-seguimiento').style.display = 'flex';
                document.getElementById('texto-problema').innerText = problema;
            }
        });

        document.getElementById('btn-quedo').addEventListener('click', function(e) {
            e.preventDefault(); 
            let accion = flujoActual[pasoActual];
            const codigoTicket = document.getElementById('codigo_ticket').value.trim();
            capturarMotoresSiAplican(); // Extraer motores si se mostraron

            if (estatusPendienteLargo && !modoRevisionPendiente) {
                let pendientes = JSON.parse(localStorage.getItem('ticketsPendientes')) || {};
                pendientes[codigoTicket] = { problema: document.getElementById('tipo_problema').value, paso: pasoActual, accionLarga: accion };
                localStorage.setItem('ticketsPendientes', JSON.stringify(pendientes));
                accionResuelta = accion + " (Enviado a otra estación)";
                cantidadAplicada = "N/A";
                resultadoRetrabajo = "Pendiente de Validación"; 
            } else {
                if (modoRevisionPendiente) {
                    let pendientes = JSON.parse(localStorage.getItem('ticketsPendientes')) || {};
                    delete pendientes[codigoTicket];
                    localStorage.setItem('ticketsPendientes', JSON.stringify(pendientes));
                    modoRevisionPendiente = false;
                }
                const inputVal = document.getElementById('modal-input-cuantas').value;
                accionResuelta = accion.replace("(cuantas)", "").trim();
                cantidadAplicada = inputVal || "N/A";
                resultadoRetrabajo = "Reparado"; 
            }
            
            document.getElementById('modal-seguimiento').style.display = 'none';
            document.getElementById('miFormulario').requestSubmit();
        });

        document.getElementById('btn-no-quedo').addEventListener('click', function(e) {
            e.preventDefault(); 
            const codigoTicket = document.getElementById('codigo_ticket').value.trim();
            capturarMotoresSiAplican(); // Extraer motores si se mostraron

            if (modoRevisionPendiente) {
                let pendientes = JSON.parse(localStorage.getItem('ticketsPendientes')) || {};
                delete pendientes[codigoTicket];
                localStorage.setItem('ticketsPendientes', JSON.stringify(pendientes));
                modoRevisionPendiente = false;
            }

            pasoActual++; 
            if (pasoActual < flujoActual.length) {
                mostrarPaso();
            } else {
                accionResuelta = "Agotado - Sin solución";
                cantidadAplicada = "N/A";
                resultadoRetrabajo = "No Reparado"; 
                document.getElementById('modal-seguimiento').style.display = 'none';
                document.getElementById('miFormulario').requestSubmit();
            }
        });

        // Login y Enter preventions...
        document.getElementById('btn-login').addEventListener('click', function(e) {
            e.preventDefault();
            const emp = document.getElementById('num_empleado').value, est = document.getElementById('estacion_trabajo').value;
            if (!((emp[6] === 'A' || emp[6] === 'a') && emp.length === 7) || est.length < 10) return alert("Verifique gafete y estación.");
            empleadoLogueado = emp; estacionLogueada = est;
            document.getElementById('info-usuario').textContent = emp.slice(1,6) + " @ " + est;
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('formulario-container').style.display = 'block';
            document.getElementById('codigo_ticket').focus();
        });

        document.getElementById('estatus').addEventListener('change', function() {
            if (this.value === 'Retrabajo') {
                document.getElementById('retrabajo-fields').style.display = 'block';
                document.getElementById('tipo_problema').value = ""; 
                accionResuelta = "";
            } else document.getElementById('retrabajo-fields').style.display = 'none';
        });

        document.getElementById('modal-input-cuantas').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); if (!document.getElementById('btn-quedo').disabled) document.getElementById('btn-quedo').click(); }});
        document.getElementById('miFormulario').addEventListener('keydown', e => { if (e.key === 'Enter' && e.target.nodeName === 'INPUT' && e.target.id !== 'modal-input-cuantas') e.preventDefault(); });

        // Enviar final
        document.getElementById('miFormulario').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const codigoTicketInput = document.getElementById('codigo_ticket');
            if (codigoTicketInput.value.trim() === "" || codigoTicketInput.value.length < 17) { alert("Revisa el ticket."); codigoTicketInput.focus(); return; }

            const tipoProblemaVal = document.getElementById('tipo_problema').value;
            if (document.getElementById('estatus').value === 'Retrabajo' && flujosProblema[tipoProblemaVal] && accionResuelta === "") {
                alert("Completa el flujo."); document.getElementById('modal-seguimiento').style.display = 'flex'; return;
            }
            
            document.getElementById('mensaje-exito').style.display = 'none'; document.getElementById('mensaje-error').style.display = 'none';
            
            const formData = new FormData(this);
            formData.append("numero_empleado", empleadoLogueado);
            formData.append("estacion_trabajo", estacionLogueada);
            formData.append("accion_exitosa", accionResuelta);
            formData.append("cantidad_accion", cantidadAplicada);
            formData.append("resultado_retrabajo", resultadoRetrabajo);
            
            const btnEnviar = document.getElementById('btn-enviar');
            btnEnviar.disabled = true; btnEnviar.textContent = 'Procesando...';
            
            fetch(URL_SCRIPT, { method: 'POST', body: formData })
            .then(response => response.json())
            .then(data => {
                if (data.result === 'success') {
                    document.getElementById('mensaje-exito').style.display = 'block';
                    this.reset(); 
                    document.getElementById('retrabajo-fields').style.display = 'none';
                    document.getElementById('motor_ticket').value = "N/A";
                    document.getElementById('motor_colocado').value = "N/A";
                    accionResuelta = ""; cantidadAplicada = ""; resultadoRetrabajo = ""; modoRevisionPendiente = false;
                    setTimeout(() => { document.getElementById('mensaje-exito').style.display = 'none'; document.getElementById('codigo_ticket').focus(); }, 1200);
                } else document.getElementById('mensaje-error').style.display = 'block';
            })
            .catch(() => document.getElementById('mensaje-error').style.display = 'block')
            .finally(() => { btnEnviar.disabled = false; btnEnviar.textContent = 'Guardar Registro'; });
        });
    </script>
</body>
</html>
